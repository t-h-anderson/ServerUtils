services:
  desktop-bot:
    build: .
    privileged: true
    network_mode: host
    environment:
      - BOT_TOKEN
      - ALLOWED_CHAT_IDS
      - DESKTOP_IP
      - DESKTOP_MAC
      - DESKTOP_SSH_USER
    volumes:
      - /root/.ssh:/root/.ssh:ro
      - /usr/bin/tailscale:/usr/bin/tailscale:ro
      - /var/run/tailscale:/var/run/tailscale:ro
    restart: unless-stopped
